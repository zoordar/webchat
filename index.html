<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatterbox AI - Login</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body class="dark-mode">

    <div id="auth-section" class="glass-panel active slide-in">
        <div class="auth-box">

            <div class="logo">
                <span class="material-icons logo-icon primary-gradient-text">language</span>
                <h1>Chatterbox <span class="primary-gradient-text">AI</span></h1>
            </div>

            <p class="subtitle">Connect across languages instantly.</p>

            <form id="login-form">
                <div class="input-group">
                    <span class="material-icons">email</span>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <span class="material-icons">lock</span>
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <button type="button" class="btn primary-btn" onclick="loginWithEmail()">
                    Login with Email
                </button>
            </form>

            <div class="divider"><span>OR</span></div>

            <button class="btn google-btn" onclick="loginWithGoogle()">
                Continue with Google
            </button>

        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>

</html>
